<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Charity Tabernacle Agbor - Live Service</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Plyr CSS -->
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      margin:0;
      background:#f5f5f5;
      text-align:center;
    }

    header {
      background:#111;
      color:white;
      padding:20px;
      text-align:center;
      border-bottom:3px solid #f5a623;
    }

    header a {
      color:#f5a623;
      text-decoration:none;
      margin:0 10px;
      font-weight:bold;
    }

    header a:hover {
      text-decoration:underline;
    }

    /* Responsive player container */
    .video-container {
      position: relative;
      width: 90%;
      max-width: 900px;
      margin: 40px auto;
      padding-top: 56.25%; /* 16:9 Aspect Ratio */
    }

    .video-container iframe {
      position: absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
    }

    p.service-times {
      font-weight: bold;
      margin-top: 20px;
      font-size: 1.1em;
    }

    footer {
      background:#111;
      color:white;
      padding:20px;
      text-align:center;
      margin-top:40px;
    }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <h1><a href="index.html" style="color:white;text-decoration:none;">Charity Tabernacle Agbor</a></h1>
  <p>Live Service</p>
</header>

<!-- Live Service Player -->
<div class="video-container" id="live-service">
  <iframe
    src="https://www.youtube.com/embed/UCwLLSjfGQBN0ZAA1wIK0fCQ?autoplay=1&rel=0&modestbranding=1"
    allowfullscreen
    allow="autoplay; encrypted-media"
  ></iframe>
</div>

<p class="service-times">Sunday Service – 9:00 AM | Wednesday Service – 4:30 PM</p>

<!-- Footer -->
<footer>
  <p>© 2026 Charity Tabernacle Agbor</p>
</footer>

<!-- Plyr JS -->
<script src="https://cdn.plyr.io/3.7.8/plyr.min.js"></script>
<script>
  const player = new Plyr('#live-service iframe');
</script>

</body>
</html>
