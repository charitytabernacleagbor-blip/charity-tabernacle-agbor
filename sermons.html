<!DOCTYPE html>
<html>
<head>
<title>Charity Tabernacle Agbor - Archive</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:Arial, sans-serif;
margin:0;
background:#f5f5f5;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
border-bottom:3px solid #f5a623;
}

header a{
color:#f5a623;
text-decoration:none;
margin:0 10px;
font-weight:bold;
}

header a:hover{
text-decoration:underline;
}

section{
padding:40px 20px;
text-align:center;
}

.search-box{
max-width:400px;
margin:20px auto;
}

.search-box input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

.filters{
margin:20px 0;
}

.filters button{
padding:10px 15px;
margin:5px;
border:none;
background:#111;
color:white;
border-radius:5px;
cursor:pointer;
}

.filters button:hover{
background:#f5a623;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
max-width:1100px;
margin:auto;
}

.video{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 4px 6px rgba(0,0,0,0.1);
}

.video iframe{
width:100%;
height:200px;
border:none;
border-radius:6px;
}

.video p{
margin-top:8px;
font-weight:bold;
}

footer{
background:#111;
color:white;
padding:20px;
text-align:center;
margin-top:40px;
}

</style>

</head>

<body>

<header>

<h1>
<a href="index.html" style="color:white;text-decoration:none;">
Charity Tabernacle Agbor
</a>
</h1>

<p>Raising Lives Through The Word of God</p>
<p>Pastor Eugene Uzoma Ibeabuchi</p>

<p>
<a href="index.html">Home</a> |
<a href="live.html">Watch Live</a> |
<a href="sermons.html">Archive</a>
</p>

</header>


<section>

<h2>Message Archive</h2>

<p>Watch past services, teachings and conventions.</p>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search messages..." onkeyup="searchVideos()">
</div>

<div class="filters">
<button onclick="filterVideos('all')">All</button>
<button onclick="filterVideos('sunday')">Sunday</button>
<button onclick="filterVideos('wednesday')">Wednesday</button>
<button onclick="filterVideos('convention')">Convention</button>
</div>

</section>


<section>

<div class="grid" id="videoGrid">

<div class="video sunday">
<iframe src="https://www.youtube.com/embed?listType=playlist&list=UUwLLSjfGQBN0ZAA1wIK0fCQ"></iframe>
<p>Latest Services</p>
</div>

</div>

</section>


<section>

<p>
<a href="https://www.youtube.com/@charitytabernacleagbor4316" target="_blank">
View Full Archive on YouTube
</a>
</p>

</section>


<footer>

<p>© 2026 Charity Tabernacle Agbor</p>

</footer>


<script>

function searchVideos() {

let input = document.getElementById("searchInput");
let filter = input.value.toLowerCase();
let videos = document.getElementsByClassName("video");

for (let i = 0; i < videos.length; i++) {

let text = videos[i].innerText.toLowerCase();

if (text.includes(filter)) {
videos[i].style.display = "";
} else {
videos[i].style.display = "none";
}

}

}


function filterVideos(category){

let videos = document.getElementsByClassName("video");

for(let i=0;i<videos.length;i++){

if(category==="all"){
videos[i].style.display="block";
}
else if(videos[i].classList.contains(category)){
videos[i].style.display="block";
}
else{
videos[i].style.display="none";
}

}

}

</script>

</body>
</html>
