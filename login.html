<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Charity Tabernacle Agbor</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" type="image/png" href="Logo.png">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Segoe UI', Tahoma, sans-serif;
  background:#1b1208;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

.login-box{
  background:#f5f1e8;
  width:100%;
  max-width:430px;
  padding:35px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.35);
  text-align:center;
  border-top:5px solid #b8860b;
}

.login-box img{
  height:80px;
  margin-bottom:15px;
}

.login-box h1{
  color:#1b1208;
  font-size:26px;
  margin-bottom:8px;
}

.login-box p{
  color:#555;
  margin-bottom:25px;
}

input{
  width:100%;
  padding:13px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:7px;
  font-size:15px;
}

button{
  width:100%;
  padding:13px;
  background:#b8860b;
  color:white;
  border:none;
  border-radius:7px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#8b6508;
}

.register-btn{
  display:block;
  text-align:center;
  margin-top:15px;
  background:#1b1208;
  color:#f5c46b;
  padding:12px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
  border:2px solid #b8860b;
}

.register-btn:hover{
  background:#2a1b0d;
}

.error{
  color:#b00020;
  margin-top:15px;
  font-weight:600;
  display:none;
}

.back{
  display:block;
  margin-top:20px;
  color:#1b1208;
  text-decoration:none;
  font-weight:600;
}

.back:hover{
  text-decoration:underline;
}
</style>
</head>

<body>

<div class="login-box">
  <img src="Logo.png" alt="Charity Tabernacle Agbor Logo">

  <h1>Member Login</h1>

  <p>
    Enter your access password to continue.
  </p>

  <input type="password" id="password" placeholder="Enter password">

  <button onclick="login()">Login</button>

  <a href="register.html" class="register-btn">
    Create Account / Register
  </a>

  <div class="error" id="error">
    Incorrect password. Please try again.
  </div>

  <a href="index.html" class="back">
    ← Back to Home
  </a>
</div>

<script>
function login(){
  const password = document.getElementById("password").value;

  if(password === "charity2026"){
    localStorage.setItem("memberLoggedIn", "true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").style.display = "block";
  }
}
</script>

</body>
</html>
