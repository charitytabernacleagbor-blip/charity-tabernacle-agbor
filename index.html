<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Charity Tabernacle Agbor</title>
<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* Header */
header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
  border-bottom: 3px solid #f5a623;
}
header img {
  height: 80px;
}
header a {
  color: #f5a623;
  text-decoration: none;
  margin: 0 10px;
  font-weight: bold;
}
header a:hover {
  text-decoration: underline;
}

/* Sections */
section {
  padding: 30px 20px;
  background: #f9f9f9;
  margin: 20px auto;
  border-radius: 8px;
  max-width: 1000px;
  text-align: center;
}

section h2 {
  margin-bottom: 20px;
  color: #111;
}

/* Videos */
.video {
  max-width: 800px;
  margin: 20px auto;
}

/* Footer */
footer {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
}

#dailyQuote {
  font-style: italic;
  color: #f5a623;
  margin: 15px 0;
  font-size: 18px;
}
</style>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />

</head>
<body>

<!-- Header -->
<header>
  <img src="Logo.png" alt="Charity Tabernacle Logo">
  <h1>Charity Tabernacle Agbor</h1>
  <p>Raising Lives Through The Word of God</p>
  <p>
    <a href="index.html">Home</a> |
    <a href="live.html">Watch Live</a> |
    <a href="sermons.html">Archives</a>
  </p>
</header>

<!-- Announcements -->
<section>
  <h2>Announcements</h2>
  <p id="announcements">Loading announcements...</p>
  
  <!-- Daily Quote replaces old Daily Scriptures -->
  <div id="dailyQuote">Loading daily quote...</div>
</section>

<!-- Service Times -->
<section>
  <h2>Service Times</h2>
  <p id="services">Loading service times...</p>
</section>

<!-- Events -->
<section>
  <h2>Upcoming Events</h2>
  <p id="events">Loading events...</p>
</section>

<!-- Live Player (Plyr + YouTube) -->
<section>
  <h2>Watch Live</h2>
  <div class="video">
    <video id="player" playsinline controls data-poster="Banner.png">
      <source src="https://www.youtube.com/watch?v=YOUR_LIVE_VIDEO_ID" type="video/youtube">
    </video>
  </div>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 Charity Tabernacle Agbor</p>
</footer>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
<script>
const player = new Plyr('#player');

// Fetch data from JSON
fetch('/data/churchData.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('announcements').innerText = data.announcements || "";
    document.getElementById('services').innerText = data.services || "";
    document.getElementById('events').innerText = data.events || "";
    document.getElementById('dailyQuote').innerText = data.dailyQuote || "";
  })
  .catch(err => console.log(err));
</script>

</body>
</html>
