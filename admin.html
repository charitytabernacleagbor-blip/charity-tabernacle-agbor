<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Church Admin Panel</title>
<style>
body{font-family:Arial,sans-serif; margin:0; padding:20px; background:#f5f5f5;}
h1{color:#111;}
label{display:block; margin-top:10px;}
textarea, input{width:100%; padding:8px; margin-top:5px; box-sizing:border-box;}
button{margin-top:15px; padding:10px 20px; background:#f5a623; border:none; color:white; font-weight:bold; cursor:pointer;}
button:hover{background:#e5941e;}
</style>
</head>
<body>

<h1>Church Admin Panel</h1>

<p><strong>Password:</strong></p>
<input type="password" id="adminPassword" placeholder="Enter password">
<button onclick="login()">Login</button>

<div id="adminContent" style="display:none;">
  <h2>Announcements</h2>
  <textarea id="announcementsText" rows="5" placeholder="Enter announcements here..."></textarea>
  
  <h2>Service Times</h2>
  <textarea id="servicesText" rows="3" placeholder="Enter service times here..."></textarea>
  
  <h2>Events</h2>
  <textarea id="eventsText" rows="5" placeholder="Enter upcoming events here..."></textarea>
  
  <button onclick="saveData()">Save Changes</button>
  
  <p id="status" style="color:green; font-weight:bold;"></p>
</div>

<script>
const PASSWORD = "CharityAdmin2026"; // Change to your preferred password

function login() {
  const pass = document.getElementById("adminPassword").value;
  if(pass === PASSWORD) {
    document.getElementById("adminContent").style.display = "block";
    document.getElementById("adminPassword").style.display = "none";
    document.querySelector("button").style.display = "none";
  } else {
    alert("Incorrect password");
  }
}

// Load saved data if exists
const savedData = localStorage.getItem("churchData");
if(savedData){
  const data = JSON.parse(savedData);
  document.getElementById("announcementsText").value = data.announcements || "";
  document.getElementById("servicesText").value = data.services || "";
  document.getElementById("eventsText").value = data.events || "";
}

function saveData(){
  const data = {
    announcements: document.getElementById("announcementsText").value,
    services: document.getElementById("servicesText").value,
    events: document.getElementById("eventsText").value
  };
  localStorage.setItem("churchData", JSON.stringify(data));
  document.getElementById("status").innerText = "Changes saved locally!";
}
<script>
const PASSWORD = "CharityAdmin2026"; // change if needed
const DATA_FILE = "/data/churchData.json";

function login() {
  const pass = document.getElementById("adminPassword").value;
  if(pass === PASSWORD){
    document.getElementById("adminContent").style.display = "block";
    document.getElementById("adminPassword").style.display = "none";
    document.querySelector("button").style.display = "none";
    loadData();
  } else {
    alert("Incorrect password");
  }
}

// Load data from JSON file
async function loadData(){
  try{
    const response = await fetch(DATA_FILE);
    if(response.ok){
      const data = await response.json();
      document.getElementById("announcementsText").value = data.announcements || "";
      document.getElementById("servicesText").value = data.services || "";
      document.getElementById("eventsText").value = data.events || "";
    } else {
      console.log("Data file not found. Using defaults.");
    }
  } catch(err){
    console.log("Error loading data:", err);
  }
}

// Save changes to JSON (via Vercel API or Netlify functions later)
function saveData(){
  const data = {
    announcements: document.getElementById("announcementsText").value,
    services: document.getElementById("servicesText").value,
    events: document.getElementById("eventsText").value
  };
  
  // For now, we just save locally (next we’ll implement server write)
  localStorage.setItem("churchData", JSON.stringify(data));
  alert("Changes saved locally. Next step will make it update live site!");
}
</script>

</body>
</html>
