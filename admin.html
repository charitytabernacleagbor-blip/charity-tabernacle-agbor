<!DOCTYPE html>
<html>
<head>
<title>Charity Tabernacle Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: Arial, sans-serif; margin:20px; background:#f9f9f9; }
h1 { text-align:center; color:#111; }
label { display:block; margin-top:15px; font-weight:bold; }
input, textarea { width:100%; padding:8px; margin-top:5px; border-radius:5px; border:1px solid #ccc; }
button { margin-top:20px; padding:10px 20px; background:#f5a623; color:white; border:none; border-radius:5px; font-weight:bold; cursor:pointer; }
button:hover { background:#e6951a; }
</style>
</head>
<body>

<h1>Charity Tabernacle Admin Panel</h1>

<form id="adminForm">
  <label for="announcements">Announcements (ticker & section):</label>
  <textarea id="announcements" rows="3"></textarea>

  <label for="dailyQuote">Daily Quote:</label>
  <input type="text" id="dailyQuote">

  <label for="services">Service Times:</label>
  <input type="text" id="services">

  <label for="bannerImage">Banner Image URL:</label>
  <input type="text" id="bannerImage" placeholder="e.g. Banner.jpg">

  <button type="submit">Save Updates</button>
</form>

<script>
const form = document.getElementById('adminForm');

// Load existing data from localStorage
const savedData = JSON.parse(localStorage.getItem('churchData') || '{}');
document.getElementById('announcements').value = savedData.announcements || 'Sunday and Wednesday services are ongoing.';
document.getElementById('dailyQuote').value = savedData.dailyQuote || 'Trust in the Lord with all your heart. – Proverbs 3:5';
document.getElementById('services').value = savedData.services || 'Sunday: 9:00 AM, Wednesday: 6:00 PM';
document.getElementById('bannerImage').value = savedData.bannerImage || 'Banner.jpg';

// Save updates
form.addEventListener('submit', e => {
  e.preventDefault();
  const updatedData = {
    announcements: document.getElementById('announcements').value,
    dailyQuote: document.getElementById('dailyQuote').value,
    services: document.getElementById('services').value,
    bannerImage: document.getElementById('bannerImage').value
  };
  localStorage.setItem('churchData', JSON.stringify(updatedData));
  alert('Updates saved! Homepage will show changes on next refresh.');
});
</script>

</body>
</html>
