<!DOCTYPE html>
<html>
<head>
  <title>Church Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body{
      font-family: Arial, sans-serif;
      max-width:900px;
      margin:auto;
      padding:20px;
      background:#f5f5f5;
    }

    h2{
      text-align:center;
      color:#111;
      margin-bottom:20px;
    }

    label{
      font-weight:bold;
    }

    input, textarea{
      width:100%;
      padding:10px;
      margin-bottom:15px;
      box-sizing:border-box;
    }

    button{
      padding:10px 20px;
      background:#f5a623;
      color:white;
      border:none;
      cursor:pointer;
      font-size:16px;
    }

    .event-card{
      border:1px solid #ddd;
      padding:10px;
      margin-bottom:10px;
      border-radius:5px;
      background:white;
    }

    .event-card input{
      width:calc(100% - 20px);
      margin-bottom:5px;
    }

    /* Hide content initially */
    #adminContent{
      display:none;
    }
  </style>
</head>
<body>

<div id="adminContent">

<h2>Church Admin Panel</h2>

<!-- Announcements -->
<label>Announcements</label>
<textarea id="announcements" rows="4" placeholder="Enter announcements here..."></textarea>

<!-- Daily Quote -->
<label>Daily Quote</label>
<textarea id="dailyQuote" rows="3" placeholder="Enter daily quote here..."></textarea>

<!-- Service Times -->
<label>Sunday Service Time</label>
<input id="sundayService" placeholder="e.g., 9:00 AM">

<label>Wednesday Service Time</label>
<input id="wednesdayService" placeholder="e.g., 6:00 PM">

<!-- Banner Image -->
<label>Banner Image URL</label>
<input id="bannerImage" placeholder="e.g., Banner.jpg">

<!-- Upcoming Events -->
<h3>Upcoming Events</h3>
<div id="eventsContainer"></div>
<button onclick="addEvent()">Add Event</button>

<!-- Generate JSON -->
<h3>Copy this into churchData.json</h3>
<textarea id="output" style="height:300px;"></textarea>
<br>
<button onclick="generate()">Generate Update</button>

</div>

<script>
  // PASSWORD
  const PASSWORD = "CharityAdmin2026"; // <-- updated password

  const userPass = prompt("Enter Admin Password:");
  if(userPass === PASSWORD){
    document.getElementById("adminContent").style.display = "block";
  } else {
    alert("Incorrect password! Access denied.");
    document.body.innerHTML = "<h2 style='text-align:center;color:red;'>Access Denied</h2>";
  }

  // Add a new event card
  function addEvent(){
    const container = document.getElementById('eventsContainer');
    const div = document.createElement('div');
    div.className = 'event-card';
    div.innerHTML = `
      <input type="text" placeholder="Event Title" class="ev-title"><br>
      <input type="text" placeholder="Date" class="ev-date"><br>
      <input type="text" placeholder="Location" class="ev-location"><br>
      <button onclick="removeEvent(this)">Remove Event</button>
    `;
    container.appendChild(div);
  }

  function removeEvent(btn){
    btn.parentElement.remove();
  }

  // Generate JSON
  function generate(){
    const events = Array.from(document.querySelectorAll('.event-card')).map(ev => ({
      title: ev.querySelector('.ev-title').value,
      date: ev.querySelector('.ev-date').value,
      location: ev.querySelector('.ev-location').value
    }));

    const data = {
      announcements: document.getElementById('announcements').value,
      dailyQuote: document.getElementById('dailyQuote').value,
      services: {
        sunday: document.getElementById('sundayService').value,
        wednesday: document.getElementById('wednesdayService').value
      },
      bannerImage: document.getElementById('bannerImage').value,
      events: events
    };

    document.getElementById('output').value = JSON.stringify(data,null,2);
  }
</script>

</body>
</html>
