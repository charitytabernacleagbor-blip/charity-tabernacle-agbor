<!DOCTYPE html>
<html>
<head>

<title>Church Admin</title>

<style>

body{
font-family:Arial;
max-width:700px;
margin:auto;
padding:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:15px;
}

button{
padding:10px 20px;
background:#f5a623;
color:white;
border:none;
}

</style>

</head>

<body>

<h2>Church Admin Panel</h2>

<label>Announcements</label>
<textarea id="announcements"></textarea>

<label>Daily Quote</label>
<input id="dailyQuote">

<label>Service Times</label>
<input id="services">

<label>Banner Image</label>
<input id="bannerImage">

<button onclick="generate()">Generate Update</button>

<h3>Copy this into churchData.json</h3>

<textarea id="output" style="height:300px"></textarea>

<script>

function generate(){

const data={

announcements:document.getElementById("announcements").value,

dailyQuote:document.getElementById("dailyQuote").value,

services:document.getElementById("services").value,

bannerImage:document.getElementById("bannerImage").value,

events:[]

};

document.getElementById("output").value=
JSON.stringify(data,null,2);

}

</script>

</body>
</html>
