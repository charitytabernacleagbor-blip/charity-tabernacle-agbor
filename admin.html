<!DOCTYPE html>
<html>
<head>
<title>Charity Tabernacle Agbor Admin Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  margin: 0;
  padding: 0;
}

header {
  background: #111;
  color: white;
  padding: 20px;
  text-align: center;
  border-bottom: 3px solid #f5a623;
}

header h1 {
  margin: 0;
}

section {
  background: #fff;
  margin: 20px auto;
  padding: 20px;
  border-radius: 8px;
  max-width: 900px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

section h2 {
  margin-top: 0;
  color: #111;
  text-align: center;
}

textarea {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-family: Arial, sans-serif;
  font-size: 16px;
  resize: vertical;
}

input[type="text"] {
  width: 100%;
  padding: 10px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 16px;
  margin-bottom: 10px;
}

button {
  background: #f5a623;
  color: white;
  border: none;
  padding: 12px 20px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #e5941f;
}

.event-card {
  background: #f9f9f9;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 6px;
}

.event-card input {
  margin-bottom: 5px;
}
</style>
</head>
<body>

<header>
  <h1>Charity Tabernacle Agbor Admin Panel</h1>
  <p>Edit announcements, daily quotes, service times, and upcoming events</p>
</header>

<section>
  <h2>Announcements</h2>
  <textarea id="announcementsInput" rows="4" placeholder="Enter announcements here..."></textarea>
</section>

<section>
  <h2>Daily Quote</h2>
  <textarea id="dailyQuoteInput" rows="4" placeholder="Enter daily quote here..."></textarea>
</section>

<section>
  <h2>Service Times</h2>
  <textarea id="serviceTimesInput" rows="2" placeholder="Enter service times here..."></textarea>
</section>

<section>
  <h2>Upcoming Events</h2>
  <div id="eventsContainer"></div>
  <button id="addEventBtn">Add Event</button>
</section>

<section>
  <button id="saveBtn">Save Changes</button>
</section>

<script>
// Load existing data from churchData.json
fetch('/data/churchData.json')
  .then(res => res.json())
  .then(data => {
    document.getElementById('announcementsInput').value = data.announcements || "";
    document.getElementById('dailyQuoteInput').value = data.dailyQuote || "";
    document.getElementById('serviceTimesInput').value = data.services || "";
    
    // Load events
    const eventsContainer = document.getElementById('eventsContainer');
    const events = data.events || [];
    events.forEach((ev, idx) => addEventCard(ev.title, ev.date, ev.location, idx));
  })
  .catch(err => console.log("Error loading JSON:", err));

// Add a new event card
function addEventCard(title="", date="", location="", index=null) {
  const container = document.getElementById('eventsContainer');
  const idx = index !== null ? index : container.children.length;

  const div = document.createElement('div');
  div.className = "event-card";
  div.dataset.index = idx;
  div.innerHTML = `
    <input type="text" class="eventTitle" placeholder="Event Title" value="${title}">
    <input type="text" class="eventDate" placeholder="Event Date" value="${date}">
    <input type="text" class="eventLocation" placeholder="Event Location" value="${location}">
    <button class="removeEventBtn">Remove Event</button>
  `;
  container.appendChild(div);

  div.querySelector('.removeEventBtn').addEventListener('click', () => {
    div.remove();
  });
}

// Add new event button
document.getElementById('addEventBtn').addEventListener('click', () => {
  addEventCard();
});

// Save changes
document.getElementById('saveBtn').addEventListener('click', () => {
  const announcements = document.getElementById('announcementsInput').value;
  const dailyQuote = document.getElementById('dailyQuoteInput').value;
  const services = document.getElementById('serviceTimesInput').value;

  const events = [];
  document.querySelectorAll('.event-card').forEach(card => {
    events.push({
      title: card.querySelector('.eventTitle').value,
      date: card.querySelector('.eventDate').value,
      location: card.querySelector('.eventLocation').value
    });
  });

  const updatedData = {
    announcements,
    dailyQuote,
    services,
    events
  };

  // Normally here you would POST updatedData to your server
  // For example: fetch('/save', {method:'POST', body: JSON.stringify(updatedData)})
  console.log("Data to save:", updatedData);
  alert("Changes saved! (Simulated - implement server save to persist)");
});
</script>

</body>
</html>
