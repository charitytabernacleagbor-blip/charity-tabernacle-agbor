<!DOCTYPE html>
<html>
<head>
<title>Church Admin</title>
<style>
body {
  font-family: Arial;
  max-width: 800px;
  margin: auto;
  padding: 20px;
}
textarea, input {
  width: 100%;
  padding: 10px;
  margin-bottom: 15px;
}
button {
  padding: 10px 20px;
  background: #f5a623;
  color: white;
  border: none;
  cursor: pointer;
}
h3 {margin-top: 30px;}
.event-block {border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 5px;}
.add-event {margin-bottom: 20px;}
</style>
</head>
<body>

<h2>Church Admin Panel</h2>

<label>Announcements</label>
<textarea id="announcements" rows="4" placeholder="Enter announcements..."></textarea>

<label>Daily Quote</label>
<textarea id="dailyQuote" rows="4" placeholder="Enter daily quote..."></textarea>

<label>Service Times</label>
<textarea id="services" rows="2" placeholder="Enter service times..."></textarea>

<label>Banner Image URL</label>
<input id="bannerImage" placeholder="Enter banner image URL">

<h3>Upcoming Events</h3>
<div id="eventsContainer"></div>
<button class="add-event" onclick="addEvent()">+ Add Event</button>

<button onclick="generate()">Generate Update</button>

<h3>Copy this into churchData.json</h3>
<textarea id="output" style="height:300px"></textarea>

<script>
let eventCount = 0;

function addEvent(){
  eventCount++;
  const container = document.getElementById("eventsContainer");
  const div = document.createElement("div");
  div.className = "event-block";
  div.id = "event-" + eventCount;
  div.innerHTML = `
    <label>Event Title</label>
    <input placeholder="Event Title" class="eventTitle">
    <label>Event Date</label>
    <input placeholder="Event Date" class="eventDate">
    <label>Event Location</label>
    <input placeholder="Event Location" class="eventLocation">
    <button onclick="removeEvent(${eventCount})" style="background:red;margin-top:5px;">Remove Event</button>
  `;
  container.appendChild(div);
}

function removeEvent(id){
  const div = document.getElementById("event-" + id);
  div.remove();
}

function generate(){
  const events = [];
  document.querySelectorAll(".event-block").forEach(block => {
    const title = block.querySelector(".eventTitle").value;
    const date = block.querySelector(".eventDate").value;
    const location = block.querySelector(".eventLocation").value;
    if(title || date || location){
      events.push({title, date, location});
    }
  });

  const data = {
    announcements: document.getElementById("announcements").value,
    dailyQuote: document.getElementById("dailyQuote").value,
    services: document.getElementById("services").value,
    bannerImage: document.getElementById("bannerImage").value,
    upcomingEvents: events
  };

  document.getElementById("output").value = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
